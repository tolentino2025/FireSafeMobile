name: E2E (Playwright)

# Roda os testes E2E do app web (Expo web) no Chromium. O runner do GitHub tem
# rede liberada, então baixa os navegadores do Playwright sem o bloqueio de
# egress que existe em ambientes restritos.

on:
  push:
    branches: [main]
    paths:
      - "e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "e2e/**"
      - "playwright.config.ts"
      - "screens/**"
      - "contexts/**"
      - "components/**"
      - "navigation/**"
      - "App.tsx"
      - "package.json"
      - ".github/workflows/e2e.yml"
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Variáveis públicas do cliente (anon/publishable — seguras por design).
      # Opcionais: sem elas o app sobe em modo local e o teste de login é pulado.
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
